name: nexusroom
description: NexusRoom - 私有化自托管通讯平台客户端

publish_to: 'none'

version: 1.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 路由
  go_router: ^13.0.1
  
  # 本地数据库
  drift: ^2.14.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18
  
  # 网络请求
  dio: ^5.9.1
  web_socket_channel: ^2.4.0
  
  # LiveKit WebRTC (voice only)
  livekit_client: ^2.0.1
  
  # Media player (HTTP-FLV streaming)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_windows_video: ^1.0.10
  
  # 图片处理
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  
  # 窗口管理
  window_manager: ^0.3.7
  
  # 工具
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_screenutil: ^5.9.0
  intl: ^0.18.1
  uuid: ^4.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.14.0
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
