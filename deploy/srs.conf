# SRS 6 configuration for NexusRoom
# RTMP ingest → HTTP-FLV delivery (ultra-low CPU usage)

listen              1935;
max_connections     100;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8085;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    # HTTP-FLV live streaming
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # Disable HLS (not needed, FLV is sufficient)
    hls {
        enabled     off;
    }

    # HTTP callback to NexusRoom server for stream status tracking
    http_hooks {
        enabled         on;
        on_publish      http://server:8080/api/v1/webhook/srs;
        on_unpublish    http://server:8080/api/v1/webhook/srs;
    }
}
