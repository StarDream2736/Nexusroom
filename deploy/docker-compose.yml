version: '3.9'

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: nexusroom-server:latest
    container_name: nexusroom-server
    ports:
      - "8080:8080"
      - "51820:51820/udp"   # WireGuard
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - livekit
      - livekit-ingress
    cap_add:
      - NET_ADMIN           # WireGuard 需要
    sysctls:
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      - nexusroom-network

  postgres:
    image: postgres:16-alpine
    container_name: nexusroom-postgres
    environment:
      POSTGRES_DB: nexusroom
      POSTGRES_USER: nexusroom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexusroom_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nexusroom-network

  redis:
    image: redis:7-alpine
    container_name: nexusroom-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - nexusroom-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: nexusroom-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"  # WebRTC UDP 端口范围
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    networks:
      - nexusroom-network

  livekit-ingress:
    image: livekit/ingress:latest
    container_name: nexusroom-ingress
    ports:
      - "1935:1935"         # RTMP 推流接收端口
    environment:
      INGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-your-livekit-key}
        api_secret: ${LIVEKIT_API_SECRET:-your-livekit-secret}
        ws_url: ws://livekit:7880
        rtmp_port: 1935
        logging:
          level: info
    depends_on:
      - livekit
    restart: unless-stopped
    networks:
      - nexusroom-network

  web-admin:
    image: nginx:alpine
    container_name: nexusroom-web-admin
    ports:
      - "3000:80"
    volumes:
      - ./web-admin:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - nexusroom-network

volumes:
  pgdata:
  redisdata:

networks:
  nexusroom-network:
    driver: bridge
