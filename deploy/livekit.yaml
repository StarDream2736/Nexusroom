# LiveKit Server Configuration
# 必须与 docker-compose.yml 中的端口映射保持一致

port: 7880

# API 密钥配置（新版格式）
# 生产环境请修改为随机生成的密钥
keys:
  your-livekit-key: your-livekit-secret

# WebRTC 配置
rtc:
  # UDP 端口范围（必须与 docker-compose.yml 中的端口映射一致）
  port_range_start: 50000
  port_range_end: 50050

  # TCP fallback — 当客户端 UDP 被防火墙拦截时，通过 TCP 传输 WebRTC 媒体
  tcp_port: 7881

  # 直接指定服务器公网 IP，避免 LiveKit 向外网查询公网 IP（出站受限的服务器会超时崩溃）
  # 请将此处替换为服务器的真实公网 IP ！！！！！必须更改
  node_ip: 39.107.246.201
  use_external_ip: false

# 内置 TURN 服务器 — 解决对称 NAT / 严格防火墙下 ICE 穿透失败
turn:
  enabled: true
  udp_port: 3478
  domain: 39.107.246.201

# Redis（LiveKit 内部通信用）
redis:
  address: redis:6379

# 日志级别
logging:
  level: info

# 房间配置
room:
  # 空房间自动清理时间（秒）
  empty_timeout: 300
  # 参与者离开后保留时间（秒）
  departure_timeout: 20

# 限制配置
limits:
  # 每个房间的参与者数量限制
  num_tracks: 100
